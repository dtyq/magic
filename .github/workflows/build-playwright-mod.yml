name: Build and push playwright-mod image

on:
  workflow_dispatch:
  push:
    paths:
      - 'thirdparty/playwright-mod/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and push playwright-mod image
    uses: ./.github/workflows/image-build.yml
    secrets: inherit
    with:
      imageName: playwright-mod
