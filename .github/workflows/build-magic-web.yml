name: Build and push magic-web image

on:
  workflow_dispatch:
  push:
    paths:
      - 'frontend/magic-web/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and push magic-web image
    uses: ./.github/workflows/image-build.yml
    with:
      imageName: magic-web
