server:
  # HTTP server host and port
  enabled: ${SERVER_ENABLED:=false}
  host: ${SERVER_HOST:=localhost}
  port: ${SERVER_PORT:=81}
  # mode is optional: debug|release|test; if omitted, Gin uses debug only when APP_ENV=local
  mode: ${SERVER_MODE:-}
  # env is optional: dev|staging|production; defaults to production if omitted
  env: ${APP_ENV:-production}
  pprofEnabled: ${SERVER_PPROF_ENABLED:=false}

logging:
  # Log level: debug|info|warn|error (default: info)
  level: ${LOG_LEVEL:-debug}
  # Log format: json|text|magic (default: magic)
  format: ${LOG_FORMAT:-magic}

qdrant:
  # 复用 PHP 侧变量命名（magic-service/config/autoload/magic_flows.php）
  # 注意：该 URI 默认使用 HTTP 端口 6333，Go 侧实际连接仍使用 QDRANT_PORT（gRPC，默认 6334）
  baseUri: ${ODIN_QDRANT_BASE_URI:=http://127.0.0.1:6333}
  host: ${QDRANT_HOST:=localhost}
  port: ${QDRANT_PORT:=6334}
  # 优先复用 ODIN_QDRANT_API_KEY；若未配置，代码中会回退读取 QDRANT_API_KEY
  apiKey: ${ODIN_QDRANT_API_KEY:=}
  targetSparseBackend: ${QDRANT_TARGET_SPARSE_BACKEND:=client_bm25_qdrant_idf_v1}
  maxConcurrentWrites: ${QDRANT_MAX_CONCURRENT_WRITES:=4}
  logTimingEnabled: ${QDRANT_LOG_TIMING_ENABLED:=true}
  logSlowThresholdMs: ${QDRANT_LOG_SLOW_THRESHOLD_MS:=100}
  # gRPC connection settings
  keepAliveTime: 10       # KeepAlive ping interval (seconds)
  keepAliveTimeout: 3     # KeepAlive ping timeout (seconds)
  maxMessageSizeMb: 100   # Maximum message size (MB)
  connectionTimeout: 30   # Connection timeout (seconds)

rebuild:
  maxConcurrency: ${KNOWLEDGE_REBUILD_MAX_CONCURRENCY:=8}

mysql:
  host: ${DB_HOST:=localhost}
  port: ${DB_PORT:=3306}
  database: ${DB_DATABASE:=hyperf}
  username: ${DB_USERNAME:=root}
  password: ${DB_PASSWORD:=}
  params: ${MYSQL_PARAMS:=parseTime=true&multiStatements=true}
  # Connection pool settings
  maxOpenConns: 25    # Maximum number of open connections
  maxIdleConns: 5     # Maximum number of idle connections
  connMaxLifetime: 300 # Connection maximum lifetime (seconds)
  pingTimeout: 5      # Timeout for ping operations (seconds)
  # Logging
  logSql: ${DB_LOG_SQL:=true}

redis:
  host: ${REDIS_HOST:=localhost}
  port: ${REDIS_PORT:=6379}
  username: ${REDIS_USERNAME:=""}
  password: ${REDIS_AUTH:=""}
  db: ${REDIS_DB:=0}
  lockPrefix: ${REDIS_LOCK_PREFIX:-"magic_lock:"}
  lockTtlSeconds: 60
  spinIntervalMillis: 100
  spinMaxRetries: 50
  # Connection pool settings
  poolSize: 10              # Maximum number of connections in pool
  minIdleConns: 2           # Minimum idle connections to maintain
  connMaxIdleTime: 300      # Maximum idle time for connections (seconds)
  connMaxLifetime: 3600     # Maximum lifetime for connections (seconds)
  poolTimeout: 4            # Timeout for acquiring connection from pool (seconds)

events:
  workerCount: 0            # Number of workers for async event processing (0 to disable)
  queueSize: 0              # Event queue size for async processing (0 to disable)

security:
  jwtSecret: ${JWT_SECRET:=change-me}
  allowedOrigins: ["*"]

ipc:
  engineSocket: ${IPC_ENGINE_SOCKET:-./runtime/magic_engine.sock}
  phpSocket: ${IPC_PHP_SOCKET:-./runtime/magic_php.sock}
  protocolVersion: ${IPC_PROTOCOL_VERSION:=2}
  authToken: ${IPC_AUTH_TOKEN:=}
  maxMessageBytes: 31457280
  readTimeout: ${IPC_READ_TIMEOUT:=30}
  writeTimeout: ${IPC_WRITE_TIMEOUT:=10}
  heartbeatInterval: ${IPC_HEARTBEAT_INTERVAL:=10}
  heartbeatTimeout: ${IPC_HEARTBEAT_TIMEOUT:=30}
  maxPendingRequests: ${IPC_MAX_PENDING_REQUESTS:=4096}
  discardCapMultiplier: ${IPC_DISCARD_CAP_MULTIPLIER:=4}
  discardChunkSize: ${IPC_DISCARD_CHUNK_SIZE:=32768}
  discardTimeout: ${IPC_DISCARD_TIMEOUT:=0}
  oversizeMaxBurst: ${IPC_OVERSIZE_MAX_BURST:=3}

magicModelGateway:
  baseUrl: ${MAGIC_MODEL_GATEWAY_BASE_URL:=http://localhost:8080}
  defaultEmbeddingModel: ${KNOWLEDGE_BASE_DEFAULT_EMBEDDING_MODEL:=text-embedding-3-small}
  magicAccessToken: ${MAGIC_ACCESS_TOKEN:=""}  # 支持环境变量替换, 未配置或为空时自动生成

# Embedding 模型配置
embedding:
  # 默认向量维度（需与默认模型一致）
  dimension: ${EMBEDDING_DIMENSION:=1536}  # text-embedding-3-small 的向量维度
  # 嵌入客户端类型: php (通过 IPC 回调 PHP) 或 openai (直接调用 API)
  clientType: ${EMBEDDING_CLIENT_TYPE:=php}
  rateLimitEnabled: ${EMBEDDING_RATE_LIMIT_ENABLED:=true}
  rateLimitQPS: ${EMBEDDING_RATE_LIMIT_QPS:=30}
  rateLimitBurst: ${EMBEDDING_RATE_LIMIT_BURST:=30}
  rateLimitWaitTimeoutSeconds: ${EMBEDDING_RATE_LIMIT_WAIT_TIMEOUT_SECONDS:=10}
  # 其他可选配置
  # text-embedding-3-small: 1536 维
  # text-embedding-3-large: 3072 维
  # dmeta-embedding: 1024 维

embeddingCacheCleanup:
  autoCleanupEnabled: ${EMBEDDING_CACHE_AUTO_CLEANUP_ENABLED:=true}
  cleanupIntervalHours: ${EMBEDDING_CACHE_CLEANUP_INTERVAL_HOURS:=24}
  cleanupTimeoutMinutes: ${EMBEDDING_CACHE_CLEANUP_TIMEOUT_MINUTES:=30}
  minAccessCount: ${EMBEDDING_CACHE_MIN_ACCESS_COUNT:=2}
  maxIdleDurationHours: ${EMBEDDING_CACHE_MAX_IDLE_DURATION_HOURS:=720}
  maxCacheAgeHours: ${EMBEDDING_CACHE_MAX_CACHE_AGE_HOURS:=2160}
  batchSize: ${EMBEDDING_CACHE_BATCH_SIZE:=1000}

documentResourceLimits:
  maxSourceBytes: ${DOCUMENT_RESOURCE_MAX_SOURCE_BYTES:=524288000}
  maxTabularRows: ${DOCUMENT_RESOURCE_MAX_TABULAR_ROWS:=200000}
  maxTabularCells: ${DOCUMENT_RESOURCE_MAX_TABULAR_CELLS:=2000000}
  maxPlainTextChars: ${DOCUMENT_RESOURCE_MAX_PLAIN_TEXT_CHARS:=20000000}
  maxParsedBlocks: ${DOCUMENT_RESOURCE_MAX_PARSED_BLOCKS:=250000}
  maxFragmentsPerDocument: ${DOCUMENT_RESOURCE_MAX_FRAGMENTS_PER_DOCUMENT:=10000}
  syncMemorySoftLimitBytes: ${DOCUMENT_RESOURCE_SYNC_MEMORY_SOFT_LIMIT_BYTES:=6442450944}

storage:
  # 与 PHP cloudfile.php 对齐，默认读取私有 TOS 桶配置
  endpoint: ${FILE_PRIVATE_TOS_ENDPOINT:=}
  region: ${FILE_PRIVATE_TOS_REGION:=}
  accessKey: ${FILE_PRIVATE_TOS_AK:=}
  secretKey: ${FILE_PRIVATE_TOS_SK:=}
  bucket: ${FILE_PRIVATE_TOS_BUCKET:=}
  type: ${FILE_DRIVER:=}

ocr:
  # 知识库 OCR 凭据真值来自 PHP RPC，Go 本地只保留运行参数
  endpoint: ${VOLC_ENDPOINT:=}
  region: ${VOLC_REGION:=}
  rateLimitEnabled: ${OCR_RATE_LIMIT_ENABLED:=true}
  rateLimitQPS: ${OCR_RATE_LIMIT_QPS:=2}
  rateLimitBurst: ${OCR_RATE_LIMIT_BURST:=1}
  rateLimitWaitTimeoutSeconds: ${OCR_RATE_LIMIT_WAIT_TIMEOUT_SECONDS:=10}

rabbitmq:
  enabled: ${AMQP_ENABLE:=true}
  host: ${AMQP_HOST:=localhost}
  port: ${AMQP_PORT:=5672}
  username: ${AMQP_USER:=guest}
  password: ${AMQP_PASSWORD:=guest}
  vhost: ${AMQP_VHOST:=/}
  queues:
    embedding: ${RABBITMQ_EMBEDDING_QUEUE:=embedding_jobs}
    documentResync: ${RABBITMQ_DOCUMENT_RESYNC_QUEUE:=knowledge.document.resync}
  documentResync:
    enabled: ${RABBITMQ_DOCUMENT_RESYNC_ENABLED:=true}
    debounceWindowSeconds: ${DOCUMENT_RESYNC_MQ_DEBOUNCE_WINDOW_SECONDS:=30}
    consumerPrefetch: ${DOCUMENT_RESYNC_MQ_CONSUMER_PREFETCH:=1}
    consumerConcurrency: ${DOCUMENT_RESYNC_MQ_CONSUMER_CONCURRENCY:=4}
    taskTimeoutSeconds: ${DOCUMENT_RESYNC_MQ_TASK_TIMEOUT_SECONDS:=1800}
    stalePendingWakeupSeconds: ${DOCUMENT_RESYNC_MQ_STALE_PENDING_WAKEUP_SECONDS:=60}
    runningDeadlineGraceSeconds: ${DOCUMENT_RESYNC_MQ_RUNNING_DEADLINE_GRACE_SECONDS:=60}
    mqPublishTimeoutMillis: ${DOCUMENT_RESYNC_MQ_PUBLISH_TIMEOUT_MILLIS:=5000}
    maxRequeueAttempts: ${RABBITMQ_DOCUMENT_RESYNC_MAX_REQUEUE_ATTEMPTS:=20}
    sourceCallbackGateTTLSeconds: ${DOCUMENT_RESYNC_SOURCE_CALLBACK_GATE_TTL_SECONDS:=60}
    lockRetryBackoffMillis: ${DOCUMENT_RESYNC_MQ_LOCK_RETRY_BACKOFF_MILLIS:=2000}
    lockRetryMaxAttempts: ${DOCUMENT_RESYNC_MQ_LOCK_RETRY_MAX_ATTEMPTS:=60}
    errorRetryBackoffMillis: ${DOCUMENT_RESYNC_MQ_ERROR_RETRY_BACKOFF_MILLIS:=5000}
    errorRetryMaxAttempts: ${DOCUMENT_RESYNC_MQ_ERROR_RETRY_MAX_ATTEMPTS:=20}
    delayedRetryBaseDelayMillis: ${DOCUMENT_RESYNC_MQ_DELAYED_RETRY_BASE_DELAY_MILLIS:=60000}
    delayedRetryMaxDelayMillis: ${DOCUMENT_RESYNC_MQ_DELAYED_RETRY_MAX_DELAY_MILLIS:=1800000}
    delayedRetryMaxAttempts: ${DOCUMENT_RESYNC_MQ_DELAYED_RETRY_MAX_ATTEMPTS:=12}
